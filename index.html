    <style>

            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 25px;
            text-align: center;
            color: white;
        }
        
        h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .input-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .section-title {
            font-size: 1.4em;
            color: #2c3e50;
            margin-bottom: 20px;
            border-left: 4px solid #4facfe;
            padding-left: 10px;
        }
        
        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
        }
        
        .calculate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            margin-top: 10px;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }
        
        .calculate-btn:active {
            transform: translateY(0);
        }
        
        .results-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .result-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            transition: transform 0.3s;
        }
        
        .result-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .result-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-top: 5px;
        }
        
        /* 特殊样式用于点间距显示 */
        .pitch-spacing-container {
            display: flex;
            gap: 5px;
        }
        
        .pitch-half {
            flex: 1;
            text-align: center;
            border-right: 1px solid #ddd;
        }
        
        .pitch-half:last-child {
            border-right: none;
        }
        
        /* 设备推荐区域样式 - 完整参数版 */
        .recommendation-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-top: 30px;
        }
        
        .recommendation-title {
            font-size: 1.8em;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .level-info {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }
        
        .level-name {
            font-size: 1.6em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .level-description {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .level-criteria {
            font-size: 0.95em;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 15px;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .device-category {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .category-title {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffd700;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            padding-bottom: 10px;
        }
        
        .device-table-container {
            overflow-x: auto;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .device-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1600px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .device-table th {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 12px 15px;
            text-align: left;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .device-table td {
            padding: 10px 15px;
            border-bottom: 1px solid #e9ecef;
            color: #ff3859;
            font-size: 0.95em;
            vertical-align: top;
        }
        
        .device-table tr:hover {
            background: #f8f9fa;
        }
        
        .device-table tr:nth-child(even) {
            background: #f1f3f5;
        }
        
        .device-name {
            font-weight: bold;
            color: #ff4262;
            font-size: 1.1em;
        }
        
        .param-label {
            font-weight: 600;
            color: #2c3e50;
            min-width: 180px;
            display: inline-block;
        }
        
        .param-value {
            color: #495057;
            font-weight: 500;
        }
        
        .device-params {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 12px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin: 8px 0;
        }
        
        .param-item {
            display: flex;
            gap: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #ffd700;
            font-size: 1.2em;
        }
        
        .error {
            background: #dc3545;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }
        
        .export-btns {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

            background: #28a745;
            color: white;
        }

            background: #17a2b8;
            color: white;
        }

            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

            .input-grid, .result-grid {

            }

            }

                font-size: 1.8em;
            }

                min-width: 1200px;
            }

</head>
<body>
    <div class="container">
        <header>
            <h1>LED屏幕参数计算工具</h1>
            <div class="subtitle">LED Screen Parameter Calculation Tool</div>
        </header>
        
        <div class="content">
            <div class="input-section">
                <h2 class="section-title">屏幕参数输入</h2>
                <div class="input-grid">
                    <div class="input-group">
                        <label for="panelWidth">灯板宽度 (mm)</label>
                        <input type="number" id="panelWidth" placeholder="请输入灯板宽度">
                    </div>
                    <div class="input-group">
                        <label for="panelHeight">灯板高度 (mm)</label>
                        <input type="number" id="panelHeight" placeholder="请输入灯板高度">
                    </div>
                    <div class="input-group">
                        <label for="panelWidthPoints">灯板宽度点数</label>
                        <input type="number" id="panelWidthPoints" placeholder="请输入灯板宽度点数">
                    </div>
                    <div class="input-group">
                        <label for="panelHeightPoints">灯板高度点数</label>
                        <input type="number" id="panelHeightPoints" placeholder="请输入灯板高度点数">
                    </div>
                    <div class="input-group">
                        <label for="screenWidth">屏幕宽尺寸 (mm)</label>
                        <input type="number" id="screenWidth" placeholder="请输入屏幕宽尺寸">
                    </div>
                    <div class="input-group">
                        <label for="screenHeight">屏幕高尺寸 (mm)</label>
                        <input type="number" id="screenHeight" placeholder="请输入屏幕高尺寸">
                    </div>
                    <div class="input-group">
                        <label for="scan">扫数</label>
                        <input type="number" id="scan" placeholder="请输入扫数">
                    </div>
                    <!-- 整合后的统一箱体参数输入（只有一个箱体宽度和一个箱体高度） -->
                    <div class="input-group">
                        <label for="cabinetWidth">箱体宽度 (mm)</label>
                        <input type="number" id="cabinetWidth" placeholder="请输入箱体宽度">
                    </div>
                    <div class="input-group">
                        <label for="cabinetHeight">箱体高度 (mm)</label>
                        <input type="number" id="cabinetHeight" placeholder="请输入箱体高度">
                    </div>
                </div>
                <button class="calculate-btn" onclick="calculate()">立即计算</button>
            </div>
            
            <div class="results-section">
                <h2 class="section-title">计算结果</h2>
                <div class="result-grid">
                    <div class="result-item">
                        <div>宽灯板数量</div>
                        <div class="result-value" id="widthPanelCount">-</div>
                    </div>
                    <div class="result-item">
                        <div>高灯板数量</div>
                        <div class="result-value" id="heightPanelCount">-</div>
                    </div>
                    <div class="result-item">
                        <div>灯板总数</div>
                        <div class="result-value" id="totalPanelCount">-</div>
                    </div>
                    <div class="result-item">
                        <div>屏幕宽点数 (px)</div>
                        <div class="result-value" id="screenWidthPoints">-</div>
                    </div>
                    <div class="result-item">
                        <div>屏幕高点数 (px)</div>
                        <div class="result-value" id="screenHeightPoints">-</div>
                    </div>
                    <div class="result-item">
                        <div>屏幕总点数</div>
                        <div class="result-value" id="totalPoints">-</div>
                    </div>
                    <div class="result-item">
                        <div>单屏网线数量</div>
                        <div class="result-value" id="networkCables">-</div>
                    </div>
                    <div class="result-item">
                        <div>平米模组个数</div>
                        <div class="result-value" id="modulesPerSquare">-</div>
                    </div>
                    <div class="result-item">
                        <div>单张模组IC数量</div>
                        <div class="result-value" id="icPerModule">-</div>
                    </div>
                    <div class="result-item">
                        <div>平米IC个数</div>
                        <div class="result-value" id="icPerSquare">-</div>
                    </div>
                    <div class="result-item">
                        <div>整屏驱动IC总个数</div>
                        <div class="result-value" id="totalICCount">-</div>
                    </div>
                    <div class="result-item">
                        <div>宽箱体数量</div>
                        <div class="result-value" id="widthBoxCount">-</div>
                    </div>
                    <div class="result-item">
                        <div>高箱体数量</div>
                        <div class="result-value" id="heightBoxCount">-</div>
                    </div>
                    <div class="result-item">
                        <div>箱体总数</div>
                        <div class="result-value" id="totalBoxCount">-</div>
                    </div>
                    <div class="result-item">
                        <div>点间距 (mm)</div>
                        <div class="result-value" id="pitchSpacing">-</div>
                    </div>
                </div>
            </div>
            
            <div class="recommendation-section" id="recommendationSection" style="display: none;">
                <h2 class="recommendation-title">设备推荐</h2>
                <div class="level-info">
                    <div class="level-name" id="levelName">1-2网口小屏</div>
                    <div class="level-description" id="levelDescription">适用于小型屏幕，1-2个网口输出</div>
                    <div class="level-criteria" id="levelCriteria">档位判断条件: 屏幕总点数 ≤ 1,300,000 且 单屏网线数量 ≤ 2</div>
                </div>
                
                <div id="devicesContainer">
                    <div class="loading">正在加载推荐设备的完整参数...</div>
                </div>
                
                <div class="export-btns">
                    <button class="export-btn export-excel" onclick="exportToExcel()">导出到Excel</button>
                    <button class="export-btn export-print" onclick="printRecommendation()">打印推荐</button>
                </div>
            </div>
        </div>
    </div>

        // 严格按照要求实现的核心计算逻辑
        function calculate() {
            // 获取输入值
            const panelWidth = parseFloat(document.getElementById('panelWidth').value) || 0;
            const panelHeight = parseFloat(document.getElementById('panelHeight').value) || 0;
            const panelWidthPoints = parseFloat(document.getElementById('panelWidthPoints').value) || 0;
            const panelHeightPoints = parseFloat(document.getElementById('panelHeightPoints').value) || 0;
            const screenWidth = parseFloat(document.getElementById('screenWidth').value) || 0;
            const screenHeight = parseFloat(document.getElementById('screenHeight').value) || 0;
            const scan = parseFloat(document.getElementById('scan').value) || 1;
            // 使用统一的箱体参数（只有一个箱体宽度和一个箱体高度）
            const cabinetWidth = parseFloat(document.getElementById('cabinetWidth').value) || 0;
            const cabinetHeight = parseFloat(document.getElementById('cabinetHeight').value) || 0;
            
            // 2. 核心计算逻辑 - 完全按照要求实现
            
            // 宽/高灯板数量 (向上取整)
            const boardW = Math.ceil(screenWidth / panelWidth);
            const boardH = Math.ceil(screenHeight / panelHeight);
            
            // 灯板总数
            const totalBoard = boardW * boardH;
            
            // 屏幕宽/高点数
            const screenWpx = boardW * panelWidthPoints;
            const screenHpx = boardH * panelHeightPoints;
            
            // 屏幕总点数 (根据Excel推导的公式: ceil(widthPx/16)*16*boardW*heightPx*boardH)
            const totalPx = Math.ceil(panelWidthPoints / 16) * 16 * boardW * panelHeightPoints * boardH;
            
            // 单张模组IC数量 (根据新公式)
            const icPerBoard = Math.ceil(panelWidthPoints / 16) * Math.ceil(panelHeightPoints / scan) * 3;
            
            // 单屏网线数量 (根据新公式)
            // 使用统一的cabinetWidth和cabinetHeight
            const netLine = Math.ceil(
                Math.ceil(totalPx / panelWidthPoints / panelHeightPoints / cabinetWidth * panelWidth / cabinetHeight * panelHeight) / 
                Math.floor(650000 / cabinetWidth * panelWidth / panelWidthPoints / cabinetHeight * panelHeight / panelHeightPoints)
            );
            
            // 平米模组个数
            const boardsPerM2 = 1000000 / (panelWidth * panelHeight);
            
            // 平米IC个数
            const icPerM2 = boardsPerM2 * icPerBoard;
            
            // 整屏驱动IC总个数
            const totalIC = icPerBoard * totalBoard;

            // 新增：计算箱体数量 (向上取整)
            // 使用统一的cabinetWidth和cabinetHeight作为有效箱体尺寸
            const cabinetW = Math.ceil(screenWidth / cabinetWidth);
            const cabinetH = Math.ceil(screenHeight / cabinetHeight);
            const totalCabinet = cabinetW * cabinetH;
            
            // 计算点间距
            const pitchWidth = panelWidth / panelWidthPoints;
            const pitchHeight = panelHeight / panelHeightPoints;
            
            // 更新结果显示
            document.getElementById('widthPanelCount').textContent = boardW;
            document.getElementById('heightPanelCount').textContent = boardH;
            document.getElementById('totalPanelCount').textContent = totalBoard;
            document.getElementById('screenWidthPoints').textContent = screenWpx.toLocaleString();
            document.getElementById('screenHeightPoints').textContent = screenHpx.toLocaleString();
            document.getElementById('totalPoints').textContent = totalPx.toLocaleString();
            document.getElementById('networkCables').textContent = netLine;
            document.getElementById('modulesPerSquare').textContent = boardsPerM2.toFixed(2);
            document.getElementById('icPerModule').textContent = icPerBoard.toFixed(0);
            document.getElementById('icPerSquare').textContent = icPerM2.toFixed(0);
            document.getElementById('totalICCount').textContent = totalIC.toLocaleString();
            document.getElementById('widthBoxCount').textContent = cabinetW;
            document.getElementById('heightBoxCount').textContent = cabinetH;
            document.getElementById('totalBoxCount').textContent = totalCabinet;
            
            // 更新点间距显示
            const pitchSpacingElement = document.getElementById('pitchSpacing');
            if (Math.abs(pitchWidth - pitchHeight) < 0.0001) { // 相等的情况
                pitchSpacingElement.textContent = pitchWidth.toFixed(2);
            } else { // 不相等的情况
                pitchSpacingElement.innerHTML = `
                    <div class="pitch-spacing-container">
                        <div class="pitch-half"><strong>宽:</strong> ${pitchWidth.toFixed(2)}</div>
                        <div class="pitch-half"><strong>高:</strong> ${pitchHeight.toFixed(2)}</div>
                    </div>
                `;
            }
            
            // 显示设备推荐区域
            document.getElementById('recommendationSection').style.display = 'block';
            
            // 获取推荐设备
            getRecommendedDevices(totalPx, netLine);
        }

        // 严格按照用户的11条规则确定档位 - 修复档位调用逻辑
        function determineLevel(screenPoints, networkCables) {
            // 1. 屏幕总点数小于1300000而且单屏数量网线数量小于等于2时，调用1-2网口，如果有其中一项参数大于要求，则调用4-6网口。
            if (screenPoints < 1300000 && networkCables <= 2) {
                return "1-2网口";
            }
            // 2. 屏幕总点数小于3900000而且单屏数量网线数量小于等于6时，调用4-6网口，如果有其中一项参数大于要求，则调用8-12网口。
            else if (screenPoints < 3900000 && networkCables <= 6) {
                return "4-6网口";
            }
            // 3. 屏幕总点数小于7800000而且单屏数量网线数量小于等于12时，调用8-12网口，如果有其中一项参数大于要求，则调用16-20网口。
            else if (screenPoints < 7800000 && networkCables <= 12) {
                return "8-12网口";
            }
            // 4. 屏幕总点数小于13000000而且单屏数量网线数量小于等于20时，调用16-20，如果有其中一项参数大于要求，则调用24网口。
            else if (screenPoints < 13000000 && networkCables <= 20) {
                return "16-20网口";
            }
            // 5. 屏幕总点数小于15600000而且单屏数量网线数量小于等于24时，调用24网口，如果有其中一项参数大于要求，则调用24网口。
            else if (screenPoints < 15600000 && networkCables <= 24) {
                return "24网口";
            }
            // 6. 屏幕总点数小于20800000而且单屏数量网线数量小于等于32时，调用32网口，如果有其中一项参数大于要求，则调用40网口。
            else if (screenPoints < 20800000 && networkCables <= 32) {
                return "32网口";
            }
            // 7. 屏幕总点数小于26000000而且单屏数量网线数量小于等于40时，调用40，如果有其中一项参数大于要求，则调用60网口。
            else if (screenPoints < 26000000 && networkCables <= 40) {
                return "40网口";
            }
            // 8. 屏幕总点数小于39000000而且单屏数量网线数量小于等于60时，调用60网口，如果有其中一项参数大于要求，则调用100网口。
            else if (screenPoints < 39000000 && networkCables <= 60) {
                return "60网口";
            }
            // 9. 屏幕总点数小于65000000而且单屏数量网线数量小于等于100时，调用100网口，如果有其中一项参数大于要求，则调用200网口。
            else if (screenPoints < 65000000 && networkCables <= 100) {
                return "100网口";
            }
            // 10. 屏幕总点数小于130000000而且单屏数量网线数量小于等于200时，调用200网口，如果有其中一项参数大于要求，则调用400网口。
            else if (screenPoints < 130000000 && networkCables <= 200) {
                return "200网口";
            }
            // 11. 屏幕总点数小于260000000而且单屏数量网线数量小于等于400时，调用400网口，如果有其中一项参数大于要求，则显示：屏幕过大
            else if (screenPoints < 260000000 && networkCables <= 400) {
                return "400网口";
            }
            else {
                return "error"; // 屏幕过大
            }
        }

        // 获取推荐设备
        function getRecommendedDevices(screenPoints, networkCables) {
            const level = determineLevel(screenPoints, networkCables);
            const devicesContainer = document.getElementById('devicesContainer');
            
            if (level === "error") {
                devicesContainer.innerHTML = `
                    <div class="error">
                        <h3>⚠️ 屏幕过大警告</h3>
                        <p>超出系统计算范围，请联系工程师人工计算！</p>
                        <p><strong>屏幕总点数:</strong> ${screenPoints.toLocaleString()} &gt; 260,000,000</p>
                        <p><strong>单屏网线数量:</strong> ${networkCables} &gt; 400</p>
                    </div>
                `;
                document.getElementById('levelName').textContent = "屏幕过大警告";
                document.getElementById('levelDescription').textContent = "超出系统计算范围";
                document.getElementById('levelCriteria').textContent = "需要工程师人工计算";
                return;
            }
            
            const levelData = deviceRecommendations.levels[level];
            if (!levelData) {
                devicesContainer.innerHTML = `
                    <div class="error">
                        <h3>❌ 未找到对应的设备档位</h3>
                        <p>档位: ${level}</p>
                        <p>屏幕总点数: ${screenPoints.toLocaleString()}</p>
                        <p>单屏网线数量: ${networkCables}</p>
                        <p>可能原因: 当前数据只包含1-2网口和4-6网口档位，其他档位需要扩展数据库</p>
                    </div>
                `;
                document.getElementById('levelName').textContent = "未找到档位";
                document.getElementById('levelDescription').textContent = `当前档位: ${level}`;
                document.getElementById('levelCriteria').textContent = "请检查输入参数或扩展设备数据库";
                return;
            }
            
            // 更新档位信息
            document.getElementById('levelName').textContent = levelData.name;
            document.getElementById('levelDescription').textContent = levelData.description;
            document.getElementById('levelCriteria').textContent = `档位判断条件: ${levelData.criteria}`;
            
            // 生成设备推荐HTML
            let html = '';
            
            // 按设备类别分组显示
            for (const [categoryName, devices] of Object.entries(levelData.categories)) {
                html += `
                    <div class="device-category">
                        <div class="category-title">${categoryName}</div>
                `;
                
                devices.forEach((device, index) => {
                    const deviceName = device.型号 || device.产品名称 || `设备 ${index + 1}`;
                    html += `
                        <div class="device-item">
                            <div class="device-name">${deviceName}</div>
                            <div class="device-params">
                    `;
                    
                    // 遍历设备的所有参数
                    for (const [paramName, paramValue] of Object.entries(device)) {
                        // 跳过型号和产品名称，因为已经在标题显示
                        if (paramName === '型号' || paramName === '产品名称') continue;
                        
                        html += `
                            <div class="param-item">
                                <span class="param-label">${paramName}:</span>
                                <span class="param-value">${paramValue}</span>
                            </div>
                        `;
                    }
                    
                    html += `
                            </div>
                        </div>
                    `;
                });
                
                html += `
                    </div>
                `;
            }
            
            devicesContainer.innerHTML = html;
        }
